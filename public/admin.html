<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Central Santua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #4facfe; --accent: #00f2fe; --bg: #050505; --card: #0f0f0f;
            --text: #ffffff; --success: #00ff88; --danger: #ff3333; --warning: #ffcc00;
            --border: rgba(79, 172, 254, 0.3);
        }

        body {
            background: url('bandera.jpg') no-repeat center center fixed;
            background-size: cover; font-family: 'Inter', sans-serif;
            margin: 0; color: var(--text); overflow-x: hidden;
        }

        .overlay { background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%); min-height: 100vh; padding: 25px; backdrop-filter: blur(8px); }

        /* --- HEADER & TOP BAR --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px;
        }

        .traffic-bar {
            display: flex; gap: 15px; margin-bottom: 20px; justify-content: flex-end;
        }

        .mini-stat {
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 4px; font-size: 0.75rem;
            display: flex; align-items: center; gap: 8px; color: #aaa;
        }
        .mini-stat b { color: var(--text); font-size: 0.9rem; }

        .system-status { display: flex; gap: 15px; align-items: center; }
        .status-pill { 
            background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 4px; 
            border: 1px solid var(--border); font-size: 0.8rem;
        }
        .dot { height: 7px; width: 7px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--success); }

        /* --- DASHBOARD OPERATIVO --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { 
            background: var(--card); padding: 18px; border: 1px solid var(--border);
            border-radius: 4px; text-align: center;
        }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        .stat-number { font-size: 2rem; font-weight: 900; color: var(--primary); }

        /* --- COMANDOS --- */
        .cmd-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; padding: 8px; border-radius: 4px; background: rgba(0,0,0,0.4); }
        .btn-cmd { 
            background: transparent; border: 1px solid #444; color: #ccc; 
            padding: 8px 14px; border-radius: 3px; cursor: pointer; font-size: 0.7rem; 
            transition: 0.2s; text-transform: uppercase; font-weight: 600;
        }
        .btn-cmd:hover { border-color: var(--primary); color: var(--primary); }
        .btn-cmd.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* --- BUSCADOR --- */
        .search-container { position: relative; margin-bottom: 25px; }
        input#bus {
            width: 100%; padding: 12px 12px 12px 45px; background: #000; 
            border: 1px solid var(--border); color: var(--success); 
            font-size: 1rem; border-radius: 4px; outline: none; box-sizing: border-box;
        }
        .search-container i { position: absolute; left: 15px; top: 15px; color: var(--primary); }

        /* --- GRID DE DATOS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 6px; }
        .card.match { border: 2px solid var(--success); background: rgba(0,255,136,0.03); }
        .nro-id { font-size: 1.2rem; color: var(--primary); font-weight: bold; }
        
        .btn-action { 
            width: 100%; padding: 10px; margin-top: 10px; border: none; 
            border-radius: 3px; font-weight: bold; cursor: pointer; text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 0.8rem;
        }
        .btn-wa { background: #25d366; color: white; }
        .btn-done { background: var(--primary); color: #000; }

        #protocol-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 1000;
            justify-content: center; align-items: center;
        }
        .protocol-box { background: #111; border: 1px solid var(--primary); width: 90%; max-width: 450px; padding: 20px; border-radius: 6px; }

/* --- PANEL PUNTOS DE VENTA (ESTRUCTURA PRO) --- */
.pdv-container {
    display: none; /* Se activa por JS */
    grid-template-columns: 350px 1fr; /* Columna fija para datos, resto para mapa */
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 12px;
    height: 650px; /* Altura fija para que sea cómodo */
    margin: 20px 0;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Columna de Formulario */
.pdv-form {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: #0a0a0a;
    border-right: 1px solid #222;
    overflow-y: auto; /* Si hay muchos campos, scrollea acá adentro */
}

/* Columna de Mapa */
.pdv-map-side {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
}

#map-admin-pdv {
    width: 100%;
    height: 100%; /* Ocupa todo el alto de su columna */
}

/* Inputs con estilo Central Santua */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.input-group label {
    color: var(--primary);
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
}

.input-group input {
    background: #000 !important;
    border: 1px solid #333 !important;
    color: #fff !important;
    padding: 10px;
    border-radius: 6px;
    font-size: 0.85rem;
}

/* Botón de Guardar */
.btn-done {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #000;
    font-weight: bold;
    border: none;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

/* Vista previa de foto */
#img-pre {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #333;
    display: none; /* Se muestra al cargar foto */
}
</style>
</head>
<body>

<div class="overlay">
    <header>
        <div>
            <h1 style="margin:0; letter-spacing:2px; font-size: 1.5rem;">CENTRAL<span style="color:var(--primary)">SANTUA</span></h1>
            <span style="font-size: 0.6rem; color: #888; text-transform: uppercase;">Administración de Seguridad</span>
        </div>
        <div class="system-status">
            <div class="status-pill"><span class="dot"></span> ONLINE</div>
            <div class="status-pill" id="clock">00:00:00</div>
        </div>
    </header>

    <div class="traffic-bar">
        <div class="mini-stat">
            <i class="fas fa-users" style="color:var(--success)"></i> ONLINE: <b id="s-online">0</b>
        </div>
        <div class="mini-stat">
            <i class="fas fa-eye" style="color:var(--primary)"></i> VISITAS TOTALES: <b id="s-visitas">0</b>
        </div>
    </div>

    <div class="cmd-bar">
    <button class="btn-cmd active" id="btn-h" onclick="setView('h')">Hallazgos</button>
    <button class="btn-cmd" id="btn-b" onclick="setView('b')">Búsquedas</button>
    <button class="btn-cmd" id="btn-m" onclick="setView('m')" style="border-color:var(--success)">Matches</button>
    
    <button class="btn-cmd" id="btn-s" onclick="setView('s')" style="border-color:var(--primary)">
        <i class="fas fa-qrcode"></i> STICKERS
    </button>
    <button class="btn-cmd" id="btn-pdv" onclick="setView('pdv')" style="border-color:var(--primary)">
    <i class="fas fa-map-marker-alt"></i> PUNTOS DE VENTA
</button>

    <div style="flex-grow: 1;"></div>
    
    <button class="btn-cmd" onclick="exportDB()"><i class="fas fa-file-export"></i></button>
    <button class="btn-cmd" onclick="toggleProtocol()"><i class="fas fa-info-circle"></i></button>
</div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">Hallazgos</span>
            <span class="stat-number" id="s-h">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Búsquedas</span>
            <span class="stat-number" id="s-b">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Matchs</span>
            <span class="stat-number" id="s-m" style="color:var(--warning)">0</span>
        </div>
  
         <div class="stat-box">
    <span class="stat-label">QRs GENERADOS</span>
    <span class="stat-number" id="s-gen">0</span>
</div>

<div class="stat-box">
    <span class="stat-label">QRs ACTIVADOS</span>
    <span class="stat-number" id="s-act" style="color:var(--success)">0</span>
</div>      

    </div>

    <div class="stat-box" style="margin-bottom: 25px; text-align: left; background: rgba(0,0,0,0.8); border: 1px solid var(--primary); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    
    <span class="stat-label" style="color: var(--primary); font-weight: bold; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">
        <i class="fas fa-qrcode"></i> Producción de Stickers
    </span>
    
    <div style="display: flex; gap: 15px; align-items: flex-end; margin-top: 15px; flex-wrap: wrap; border-bottom: 1px solid #333; padding-bottom: 20px;">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 0.75rem; color: #888;">CANTIDAD</label>
            <input type="number" id="cant-qr" placeholder="Ej: 100" 
                   style="background: #000; border: 1px solid #444; color: var(--primary); padding: 10px; border-radius: 6px; width: 120px; font-weight: bold;">
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 0.75rem; color: #888;">FORMATO</label>
            <select id="tipo-qr" style="background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; cursor: pointer;">
                <option value="moto">🏍️ Moto (17x15 cm)</option>
                <option value="auto">🚗 Auto (34x15 cm)</option>
            </select>
        </div>

        <button class="btn-cmd" style="border-color: var(--success); color: var(--success); height: 42px; padding: 0 20px; font-weight: bold; transition: all 0.3s;" onclick="prepararLote()">
            <i class="fas fa-rocket"></i> GENERAR E IMPRIMIR
        </button>
    </div>

    <div style="margin-top: 20px;">
        <div style="position: relative;">
            <i class="fas fa-search" style="position: absolute; left: 15px; top: 12px; color: #666;"></i>
            <input type="text" id="buscador-id" placeholder="BUSCAR POR ID O DUEÑO (Ej: SANT-A12)..." onkeyup="filtrarStickers()" 
                   style="width: 100%; padding: 12px 12px 12px 45px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Roboto Mono', monospace;">
        </div>
    </div>
</div>

<div id="lista-lotes-acordeon" style="margin-bottom: 25px;"></div>

<div id="section-pdv" class="pdv-container" style="display: none; margin-bottom: 25px;">
    <div class="pdv-form">
        <h3 style="color:var(--primary); margin-top:0;"><i class="fas fa-store"></i> PANEL DE COMERCIOS</h3>
        
        <div class="input-group">
            <label>Nombre del Local (Público)</label>
            <input type="text" id="pdv-nombre" placeholder="Ej: Moto Repuestos 'El Rayo'">
        </div>
        
        <div class="input-group">
            <label>Dirección descriptiva</label>
            <input type="text" id="pdv-dir" placeholder="Ej: Av. Rivadavia 1234, CABA">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Latitud Exacta</label>
                <input type="text" id="pdv-lat" placeholder="-34.6037" readonly style="background: #111; color: var(--success); border-color: #222;">
            </div>
            <div class="input-group">
                <label>Longitud Exacta</label>
                <input type="text" id="pdv-lng" placeholder="-58.3816" readonly style="background: #111; color: var(--success); border-color: #222;">
            </div>
        </div>
        <small style="color: #666; font-size: 0.65rem; margin-bottom: 10px; display: block;">* Hacé clic en el mapa para capturar las coordenadas.</small>

        <div class="input-group">
            <label>WhatsApp del Local</label>
            <input type="text" id="pdv-wa" placeholder="5491122334455">
        </div>

        <div class="input-group">
            <label>Foto de Fachada</label>
            <input type="file" id="pdv-file" accept="image/*" onchange="procesarFoto(this)" style="font-size: 0.7rem;">
            <input type="hidden" id="pdv-foto">
            <img id="img-pre" src="" style="height: 100px; width: 100%; object-fit: cover; margin-top: 5px; border: 1px solid var(--primary); display:none; border-radius: 8px;">
        </div>

        <button class="btn-done" onclick="guardarPDV()" style="margin-top: 10px; background: var(--success); color: #000; font-weight: bold; height: 45px; width: 100%; border: none; border-radius: 6px; cursor: pointer;">
            <i class="fas fa-save"></i> GUARDAR PUNTO DE VENTA
        </button>
    </div>

    <div id="map-admin-pdv" style="border-left: 1px solid #222; background: #000; width: 100%; height: 100%;"></div>
</div>

<div class="search-container">
    <i class="fas fa-search"></i>
    <input type="text" id="bus" placeholder="Filtrar registros..." onkeyup="render()">
</div>

<div id="cont" class="grid"></div>

<script>

    let db = { hallazgos: [], busquedas: [] };
    let currentView = 'h';
    let limitePorLote = {};

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-AR');
    }, 1000);

    async function loadData() {
        // 1. Carga de registros operativos (Hallazgos, Búsquedas, Stickers)
        try {
            const resData = await fetch('/api/admin/data');
            if (resData.ok) {
                db = await resData.json();
                updateStats();
                render();
            }
        } catch(e) { console.error("Error en datos operativos:", e); }

        // 2. Carga de contadores de QR (Generados y Activados)
        try {
            const resStatsQR = await fetch('/api/stats');
            if (resStatsQR.ok) {
                const stats = await resStatsQR.json();
                document.getElementById('s-gen').innerText = stats.generados || 0;
                document.getElementById('s-act').innerText = stats.activados || 0;
            }
        } catch(e) { console.error("Error en stats de QR:", e); }

        // 3. Carga de tráfico (Online y Visitas)
        try {
            const resTraffic = await fetch('/api/admin/stats');
            if (resTraffic.ok) {
                const s = await resTraffic.json();
                document.getElementById('s-online').innerText = s.online || 0;
                document.getElementById('s-visitas').innerText = s.visitas || 0;
            }
        } catch(e) { console.error("Error en tráfico:", e); }
    }

    function updateStats() {
        const h = db.hallazgos ? db.hallazgos.length : 0;
        const b = db.busquedas ? db.busquedas.length : 0;
        const m = (db.hallazgos && db.busquedas) ? db.hallazgos.filter(x => db.busquedas.some(y => y.nro === x.nro)).length : 0;
        
        document.getElementById('s-h').innerText = h;
        document.getElementById('s-b').innerText = b;
        document.getElementById('s-m').innerText = m;
    }

    function setView(v) {
    currentView = v;
    
    // 1. Esto es lo tuyo: quita la luz azul y la pone en el nuevo
    document.querySelectorAll('.btn-cmd').forEach(b => b.classList.remove('active'));
    if(document.getElementById('btn-'+v)) {
        document.getElementById('btn-'+v).classList.add('active');
    }

    // 2. Seleccionamos las secciones (asegurate que los IDs coincidan)
    const sectionPdv = document.getElementById('section-pdv');
    const contNormal = document.getElementById('cont');
    const statsGrid = document.querySelector('.stats-grid');
    const acordeon = document.getElementById('lista-lotes-acordeon');

    // 3. EL "BYPASS":
    if (v === 'pdv') {
        // Ocultamos lo viejo y mostramos el mapa
        if(sectionPdv) sectionPdv.style.display = 'block';
        if(contNormal) contNormal.style.display = 'none';
        if(statsGrid) statsGrid.style.display = 'none';
        if(acordeon) acordeon.style.display = 'none';
        
        // Arrancamos el mapa
        setTimeout(initMapAdmin, 100); 
    } else {
        // Volvemos a la normalidad: mostramos lo tuyo, ocultamos mapa
        if(sectionPdv) sectionPdv.style.display = 'none';
        if(contNormal) contNormal.style.display = 'grid';
        if(statsGrid) statsGrid.style.display = 'grid';
        if(acordeon) acordeon.style.display = 'block';
        
        // Ejecutamos TU render original sin tocarle una coma
        render(); 
    }
}

    function render() {
    const cont = document.getElementById('cont');
    const listaLotesDiv = document.getElementById('lista-lotes-acordeon');
    if (!cont || !listaLotesDiv) return;

    // 1. Guardar qué lotes están abiertos para que no se cierren al recargar
    const lotesAbiertos = Array.from(document.querySelectorAll('details[open]')).map(d => d.id);

    // 2. Definir el buscador según la vista
    const query = (currentView === 's') 
        ? (document.getElementById('buscador-id')?.value.toUpperCase() || "")
        : (document.getElementById('bus')?.value.toUpperCase() || "");

    // Limpiamos los contenedores antes de dibujar
    cont.innerHTML = "";
    listaLotesDiv.innerHTML = "";

    if (currentView === 's') {
        const stickers = db.stickers || [];
        
        // --- VISTA DE STICKERS ACTIVOS (DUEÑOS) ---
        const activados = stickers.filter(s => 
            s.activado && (s.id_qr.includes(query) || (s.alias && s.alias.toUpperCase().includes(query)))
        );

        const lotesMap = {};
        stickers.forEach((s) => {
            const loteBase = s.lote_id || "Sin-Lote";
            if (!lotesMap[loteBase]) lotesMap[loteBase] = [];
            lotesMap[loteBase].push(s);
        });

        cont.innerHTML = `
            <div style="grid-column: 1/-1; width: 100%;">
                <h3 style="color:var(--success); margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px;">
                    <i class="fas fa-user-check"></i> DUEÑOS ACTIVOS (${activados.length})
                </h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom:30px;">
                    ${activados.length === 0 ? '<p style="color:#555;">No hay activados.</p>' : 
                    activados.reverse().map(s => {
                        const telLimpio = (s.telefono || s.contacto || s.tel || '').replace(/\D/g, '');
                        return `
                        <div class="card" style="border-left: 5px solid var(--success); background: #0a0a0a;">
                            <span class="nro-id">${s.id_qr}</span>
                            <p style="font-size:0.85rem; margin:10px 0; color:#eee;">
                                <b>👤 ${s.alias || 'S/D'}</b><br>
                                <span style="color:#888;">📞 ${s.telefono || 'S/D'}</span><br>
                                <span style="color:#888; font-size: 0.8rem;">📧 ${s.emailDuenio || 'Sin Correo'}</span>
                            </p>
                            <a href="https://wa.me/${telLimpio}" target="_blank" class="btn-action btn-wa">
                                <i class="fab fa-whatsapp"></i> CONTACTAR
                            </a>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;

        // --- GESTIÓN POR LOTES (ACORDEÓN) ---
        listaLotesDiv.innerHTML = Object.keys(lotesMap).sort().reverse().map(loteId => {
            if (!limitePorLote[loteId]) limitePorLote[loteId] = 10;
            const todosDelLote = lotesMap[loteId].filter(s => s.id_qr.includes(query));
            if (todosDelLote.length === 0) return '';

            const visibles = todosDelLote.slice(0, limitePorLote[loteId]);
            const hayMas = todosDelLote.length > limitePorLote[loteId];
            const checkOpen = lotesAbiertos.includes(`details-${loteId}`) ? 'open' : '';

            return `
            <details id="details-${loteId}" ${checkOpen} style="margin-bottom: 15px; background: #080808; border: 1px solid #222; border-radius: 8px; overflow:hidden;">
                <summary style="padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #111;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <i class="fas fa-folder" style="color:var(--accent); font-size:1.2rem;"></i>
                        <span style="font-weight:bold;">LOTE: ${loteId}</span>
                        <span style="color:#666; font-size:0.8rem;">(${todosDelLote.length} QRs)</span>
                    </div>
<button onclick="event.stopPropagation(); event.preventDefault(); reimprimirLote('${loteId}');" 
        class="btn-cmd" 
        style="background:#007bff; color:white; border:none; padding:5px 12px; border-radius:4px; font-size:0.7rem; font-weight:bold; cursor:pointer;">
    <i class="fas fa-print"></i> REIMPRIMIR LOTE
</button>
                </summary>
                <div style="padding: 10px;">
                    <table style="width:100%; border-collapse: collapse;">
                        <tbody>
                            ${visibles.map(s => `
                            <tr style="border-bottom: 1px solid #111;">
                                <td style="padding:10px; font-family:monospace; color:#fff;">${s.id_qr}</td>
                                <td style="padding:10px; text-align:center; font-size:0.7rem;">
                                    ${s.activado ? '<span style="color:var(--success)">ACTIVO</span>' : '<span style="color:#444">STOCK</span>'}
                                </td>
                                <td style="padding:10px; text-align:right;">
                                    <i class="fas fa-qrcode" style="cursor:pointer; color:var(--primary);" 
                                        onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://centralsantua.com.ar/index.html?id=${s.id_qr}')"></i>
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                    ${hayMas ? `<button onclick="verMasLote(event, '${loteId}')" style="width:100%; margin-top:10px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#fff; padding:12px; border-radius:4px;">Cargar más (+50)</button>` : ''}
                </div>
            </details>`;
        }).join('');

    } else {
        // --- LÓGICA DE HALLAZGOS / BÚSQUEDAS / MATCHES ---
        let data = [];
        if (currentView === 'h') data = db.hallazgos || [];
        if (currentView === 'b') data = db.busquedas || [];
        if (currentView === 'm') {
            data = (db.hallazgos && db.busquedas) 
                ? db.hallazgos.filter(x => db.busquedas.some(y => y.nro === x.nro)) 
                : [];
        }

        const filtrados = data.filter(item => item.nro.toUpperCase().includes(query));

        if (filtrados.length === 0) {
            cont.innerHTML = `<p style="color:#555; padding:20px;">No hay registros para mostrar.</p>`;
            return;
        }

        filtrados.reverse().forEach(item => {
            const nroTelefono = item.contacto || item.telefono || item.tel || 'S/D';
            const waLink = nroTelefono !== 'S/D' ? nroTelefono.replace(/\D/g, '') : '';
            const isMatch = (db.hallazgos && db.busquedas) && 
                            db.hallazgos.some(h => h.nro === item.nro) && 
                            db.busquedas.some(b => b.nro === item.nro);
            
            cont.innerHTML += `
                <div class="card ${isMatch ? 'match' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <span class="nro-id">ID: ${item.nro}</span>
                        ${isMatch ? '<span style="background:var(--success); color:#000; font-size:0.6rem; padding:2px 5px; border-radius:3px; font-weight:bold;">MATCH</span>' : ''}
                    </div>
                    <p style="font-size:0.8rem; color:#888; margin:5px 0;">Fecha: ${item.fecha || '---'}</p>
                    <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:4px; margin:10px 0; border:1px solid rgba(255,255,255,0.05);">
                        <p style="margin:0; color:#aaa; font-size:0.7rem; text-transform:uppercase;">Contacto Directo:</p>
                        <p style="margin:5px 0 0 0; font-size:1.1rem; color:var(--success); font-weight:bold;">
                            <i class="fas fa-phone-alt" style="font-size:0.8rem; opacity:0.7;"></i> ${nroTelefono}
                        </p>
                    </div>
                    <a href="https://wa.me/${waLink}" target="_blank" class="btn-action btn-wa" ${nroTelefono === 'S/D' ? 'style="pointer-events:none; opacity:0.5;"' : ''}>
                        <i class="fab fa-whatsapp"></i> CONTACTAR POR WHATSAPP
                    </a>
                    <button onclick="borrar('${currentView}', '${item.nro}')" class="btn-action" style="background:#221111; color:#ff3333; border:1px solid #442222; margin-top:8px;">
                        <i class="fas fa-trash-alt"></i> ELIMINAR REGISTRO
                    </button>
                </div>`;
        });
    }
}

    async function prepararLote() {
    const cantInput = document.getElementById('cant-qr');
    const tipoInput = document.getElementById('tipo-qr');
    const cant = parseInt(cantInput.value);
    const tipo = tipoInput.value;
    
    if(!cant || cant <= 0) return alert("Ingrese una cantidad válida.");

    const ahora = new Date();
    const tiempoExacto = `${ahora.getDate()}/${ahora.getMonth() + 1} ${ahora.getHours()}:${ahora.getMinutes()}:${ahora.getSeconds()}`;
    const nuevoLoteId = `LOTE-${tiempoExacto}`; 

    const btn = document.querySelector('button[onclick="prepararLote()"]');
    const originalText = btn.innerHTML;

    try {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> REGISTRANDO LOTE...';

        const response = await fetch('/api/generar-lote-seguro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cantidad: cant, tipo: tipo, lote_id: nuevoLoteId })
        });

        if (!response.ok) throw new Error("Error en el servidor");
        
        // Refrescamos la data para que aparezca el lote en la lista
        await loadData();
        
        alert("✅ Lote guardado en Base de Datos. Iniciando descarga automática...");

        // Lanzamos la descarga usando el botón de la lista (reutilizamos la lógica)
        reimprimirLote(nuevoLoteId);

    } catch (error) {
        alert("ERROR: " + error.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

/**

async function reimprimirLote(loteId) {
    if (!db.stickers) return alert("Error: No hay base de datos de stickers.");
    
    const stickersDelLote = db.stickers.filter(s => s.lote_id === loteId);
    if (stickersDelLote.length === 0) return alert("No hay datos para el lote: " + loteId);

    const tipoDetectado = stickersDelLote[0].tipo || 'moto';
    const listaIDs = stickersDelLote.map(s => s.id_qr);

    const botones = document.querySelectorAll('button');
    let btnTarget = Array.from(botones).find(b => b.textContent.includes('REIMPRIMIR LOTE') && b.onclick?.toString().includes(loteId));
    
    if(!btnTarget) btnTarget = document.querySelector('button[onclick="prepararLote()"]');

    await generarPdfFinalTodoJunto(listaIDs, tipoDetectado, btnTarget);
}

async function generarPdfFinalTodoJunto(listaIDs, tipo, boton) {
    const { jsPDF } = window.jspdf;
    const textoOriginal = boton.innerHTML;
    boton.disabled = true;

    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'fixed';
    tempDiv.style.left = '-10000px';
    tempDiv.style.top = '0';
    
    // CSS CORREGIDO: flex-direction row y flex-shrink para que no se deformen
    tempDiv.innerHTML = `<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Space+Mono:wght@700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .final-page-auto { 
            width: 240mm; 
            height: 110mm; 
            display: flex; 
            flex-direction: row; 
            flex-wrap: nowrap; 
            background: #fff; 
        }
        .final-unit { 
            width: 120mm; 
            height: 110mm; 
            padding: 0.5mm; 
            background: #fff; 
            display: flex; 
            flex-shrink: 0;
        }
        .b-red-ext { border: 2.5pt solid #e60000; width: 100%; height: 100%; display: flex; }
        .b-yellow-mid { border: 2.5pt solid #ffcc00; width: 100%; height: 100%; display: flex; flex: 1; }
        .b-red-int { border: 2.5pt solid #e60000; width: 100%; height: 100%; display: flex; flex: 1; }
        .final-body { background: #fff; flex: 1; display: flex; flex-direction: column; }
        .final-header { background: #000; color: #fff; padding: 4mm; display: flex; align-items: center; gap: 10px; }
        .final-logo { background: #e60000; width: 9mm; height: 9mm; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-weight: 900; border-radius: 2px; font-size: 14pt; }
        .final-main-t { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 14pt; letter-spacing: 0.5px; }
        .final-sub-t { font-family: 'Inter', sans-serif; font-size: 7pt; color: #ffcc00; font-weight: 700; }
        .final-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4mm; gap: 4mm; }
        .final-qr-box { padding: 2mm; border: 1pt solid #000; background: #fff; margin-top: 2mm; }
        .final-qr { width: 38mm; height: 38mm; display: block; }
        .final-id-container { text-align: center; width: 100%; padding: 0 10mm; }
        .final-id-label { font-family: 'Inter', sans-serif; font-size: 8pt; font-weight: 900; color: #000; letter-spacing: 1px; }
        .final-id-val { font-family: 'Space Mono', monospace; font-size: 24pt; font-weight: 700; color: #ff3333; background: #000; padding: 2mm 0; border-radius: 2px; margin-top: 1mm; width: 100%; }
        .final-footer { padding: 3mm 6mm; display: flex; justify-content: space-between; align-items: center; }
        .final-test-tag { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 14pt; color: #e60000; }
        .final-rights { font-family: 'Inter', sans-serif; font-size: 6pt; color: #aaa; }
    </style><div id="render-area"></div>`;
    
    document.body.appendChild(tempDiv);
    const renderArea = document.getElementById('render-area');

    const anchoMm = (tipo === 'auto') ? 240 : 120;
    const altoMm = 110;
    const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [anchoMm, altoMm], compress: true });

    for (let i = 0; i < listaIDs.length; i++) {
        boton.innerHTML = `<i class="fas fa-sync fa-spin"></i> ${i + 1} / ${listaIDs.length}`;

        const idUnico = listaIDs[i];
        const url = `https://centralsantua.com.ar/index.html?id=${idUnico}`;
        const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;

        const estructura = `
            <div class="final-unit">
                <div class="b-red-ext"><div class="b-yellow-mid"><div class="b-red-int">
                    <div class="final-body">
                        <div class="final-header"><div class="final-logo">S</div><div class="final-header-txt"><div class="final-main-t">SI ME PERDI ESCANEAME</div><div class="final-sub-t">CENTRAL SANTUA</div></div></div>
                        <div class="final-center"><div class="final-qr-box"><img src="${qrImg}" class="final-qr"></div><div class="final-id-container"><span class="final-id-label">ID DE CONTROL</span><div class="final-id-val">${idUnico}</div></div></div>
                        <div class="final-footer"><div class="final-test-tag">www.centralsantua.com.ar</div><div class="final-rights">© 2026 SANTUA</div></div>
                    </div>
                </div></div></div>
            </div>`;

        // Generamos el HTML según tipo
        renderArea.innerHTML = (tipo === 'auto') 
            ? `<div class="final-page-auto">${estructura}${estructura}</div>` 
            : estructura;

        await new Promise(resolve => {
            const img = renderArea.querySelector('img');
            if (img.complete) resolve(); else img.onload = resolve;
        });

        const elemento = renderArea.children[0];
        const canvas = await html2canvas(elemento, { scale: 1.5, useCORS: true });
        const imgData = canvas.toDataURL('image/jpeg', 0.8);

        if (i > 0) doc.addPage([anchoMm, altoMm], 'l');
        doc.addImage(imgData, 'JPEG', 0, 0, anchoMm, altoMm, undefined, 'FAST');

        renderArea.innerHTML = '';
        canvas.remove();
        
        if (i % 10 === 0) await new Promise(r => setTimeout(r, 1000));
    }

    doc.save(`SANTUA_${tipo.toUpperCase()}_LOTE_${Date.now()}.pdf`);
    
    boton.innerHTML = textoOriginal;
    boton.disabled = false;
    document.body.removeChild(tempDiv);
}

let mapAdmin;

async function guardarPDV() {
    const btn = document.querySelector('.btn-done');
    const originalText = btn.innerHTML;
    
    const datos = {
        nombre: document.getElementById('pdv-nombre').value,
        direccion: document.getElementById('pdv-dir').value,
        whatsapp: document.getElementById('pdv-wa').value,
        foto: document.getElementById('pdv-foto').value, 
        lat: document.getElementById('pdv-lat').value,
        lng: document.getElementById('pdv-lng').value
    };

    // Validación: que no falte lo básico
    if (!datos.nombre || !datos.lat || !datos.lng) {
        alert("❌ ERROR: Falta el nombre del local o marcar la ubicación exacta en el mapa.");
        return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/admin/guardar-pdv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        const result = await res.json();

        if (res.ok) {
            alert("✅ ¡Comercio guardado con éxito en Central Santua!");
            location.reload(); 
        } else {
            throw new Error(result.error || "Error en el servidor");
        }
    } catch (err) {
        alert("❌ ERROR al guardar: " + err.message);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

// 2. PROCESAR FOTO (Convierte el archivo a texto Base64 para el server.js)
function procesarFoto(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById('pdv-foto').value = base64; 
        const preview = document.getElementById('img-pre');
        preview.src = base64;
        preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

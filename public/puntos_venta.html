<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puntos de Venta | Central Santua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --accent: #00ff88;
            --dark-bg: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.95);
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body, html { 
            height: 100%; 
            background: var(--dark-bg); 
            color: white; 
            overflow: hidden; /* Evita el scroll doble molesto en celular */
        }

        /* --- HEADER FLOTANTE --- */
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1001;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; color: var(--accent); text-decoration: none; letter-spacing: 1px; }

        /* --- CONTENEDOR DE MAPA (FONDO TOTAL) --- */
        #map {
            position: absolute;
            top: 60px; bottom: 0; left: 0; right: 0;
            z-index: 1;
        }

        /* --- BUSCADOR Y LISTA (SIDEBAR EN PC / PANEL ABAJO EN CELU) --- */
        .ui-container {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 350px;
            max-height: calc(100% - 100px);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s ease-in-out;
        }

        .search-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-header h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--accent); }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input-wrapper i { position: absolute; left: 12px; color: var(--accent); }
        #buscador {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Scrollbar elegante */
        .results-list::-webkit-scrollbar { width: 5px; }
        .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .local-card {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .local-card:hover { border-color: var(--accent); background: rgba(0,255,136,0.05); }
        .local-card h4 { font-size: 0.95rem; margin-bottom: 5px; }
        .local-card p { font-size: 0.8rem; color: #8b949e; }

        /* BOTÓN GPS */
        .btn-gps {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: var(--accent);
            border-radius: 50%;
            border: none;
            color: black;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,255,136,0.4);
        }

        /* --- RESPONSIVE PARA TELÉFONOS --- */
        @media (max-width: 768px) {
            .ui-container {
                top: auto;
                bottom: 0;
                left: 0;
                width: 100%;
                max-height: 40%; /* Solo ocupa la parte de abajo */
                border-radius: 20px 20px 0 0;
                border-left: none; border-right: none;
            }
            .btn-gps { bottom: 42%; } /* Sube para no tapar la lista */
            #map { top: 60px; bottom: 0; }
        }

        /* Estilo de los carteles en el mapa */
        .leaflet-popup-content-wrapper { background: #161b22; color: white; border-radius: 12px; }
        .leaflet-popup-tip { background: #161b22; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">CENTRAL SANTUA</a>
        <div style="display:flex; gap:15px; font-size:0.8rem; font-weight:600;">
            <a href="index.html" style="color:white; text-decoration:none;">INICIO</a>
            <a href="perfil.html" style="color:white; text-decoration:none;">MI PERFIL</a>
        </div>
    </header>

    <div id="map"></div>

    <button class="btn-gps" onclick="obtenerUbicacion()"><i class="fas fa-location-arrow"></i></button>

    <div class="ui-container">
        <div class="search-header">
            <h2>Puntos de Venta</h2>
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="buscador" placeholder="Tu ciudad o barrio...">
            </div>
        </div>
        <div class="results-list" id="lista-locales">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa con estilo oscuro pero legible
        const map = L.map('map', { zoomControl: false }).setView([-34.6037, -58.3816], 12);
        
        // Capa de mapa (CartoDB Voyager - Muy clara y pro)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let localesGlobal = [];
        let marcadorUsuario;

        // GPS: Muestra dónde estás vos
        function obtenerUbicacion() {
            map.locate({setView: true, maxZoom: 15});
        }

        map.on('locationfound', function(e) {
            if (marcadorUsuario) map.removeLayer(marcadorUsuario);
            marcadorUsuario = L.circleMarker(e.latlng, {
                radius: 10, color: '#fff', fillColor: '#007bff', fillOpacity: 0.9, weight: 3
            }).addTo(map).bindPopup("Estás aquí").openPopup();
        });

        // Simulación de carga (Luego lo conectamos a tu server.js)
        async function cargarLocales() {
            // Ejemplo de datos
            localesGlobal = [
                { nombre: "Repuestos El Rayo", zona: "Lanús", direccion: "Hipólito Yrigoyen 4500", lat: -34.700, lng: -58.390, wa: "1112345678" },
                { nombre: "Moto Service Pro", zona: "Avellaneda", direccion: "Av. Belgrano 800", lat: -34.665, lng: -58.370, wa: "1198765432" },
                { nombre: "Centro de Estética Vehicular", zona: "Quilmes", direccion: "Mitre 200", lat: -34.720, lng: -58.255, wa: "1155443322" }
            ];
            renderizar(localesGlobal);
        }

        function renderizar(data) {
            const lista = document.getElementById('lista-locales');
            lista.innerHTML = '';

            data.forEach(local => {
                // Pin en el mapa
                const marker = L.marker([local.lat, local.lng]).addTo(map);
                marker.bindPopup(`
                    <div style="color:white; min-width:150px">
                        <h4 style="color:var(--accent)">${local.nombre}</h4>
                        <p style="font-size:0.8rem">${local.direccion}</p>
                        <a href="https://wa.me/${local.wa}" target="_blank" style="display:block; background:#25d366; color:white; text-align:center; padding:8px; border-radius:5px; text-decoration:none; margin-top:10px;">WhatsApp</a>
                    </div>
                `);

                // Card en el panel
                const card = document.createElement('div');
                card.className = 'local-card';
                card.innerHTML = `
                    <h4>${local.nombre}</h4>
                    <p><i class="fas fa-map-marker-alt" style="color:var(--accent)"></i> ${local.zona} - ${local.direccion}</p>
                `;
                card.onclick = () => {
                    map.flyTo([local.lat, local.lng], 16);
                    marker.openPopup();
                    // En celular, si tocan la lista, podemos achicar el panel para que vean el mapa
                    if(window.innerWidth < 768) {
                        document.querySelector('.ui-container').style.height = '150px';
                    }
                };
                lista.appendChild(card);
            });
        }

        // Buscador reactivo
        document.getElementById('buscador').addEventListener('input', (e) => {
            const busqueda = e.target.value.toLowerCase();
            const filtrados = localesGlobal.filter(l => 
                l.zona.toLowerCase().includes(busqueda) || 
                l.nombre.toLowerCase().includes(busqueda)
            );
            renderizar(filtrados);
        });

        cargarLocales();
    </script>
</body>
</html>

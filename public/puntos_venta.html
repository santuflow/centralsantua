<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puntos de Venta | Central Santua</title>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* MODO OSCURO - DEFAULT PRO */
            --neon: #00ffa3;
            --bg: #0a0f18;
            --header-bg: rgba(10, 15, 24, 0.85);
            --surface: rgba(23, 32, 48, 0.9);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.4);
            --marker-color: #00ffa3;
        }

        body.light-mode {
            /* MODO CLARO - ESTILO UBER/APPLE */
            --neon: #000000; /* Negro sólido para elegancia */
            --bg: #f8fafc;
            --header-bg: rgba(255, 255, 255, 0.9);
            --surface: #ffffff;
            --text-main: #1e293b; /* Azul medianoche */
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: rgba(0, 0, 0, 0.08);
            --marker-color: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body, html { height: 100vh; width: 100vw; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* --- HEADER --- */
        .elite-header {
            position: fixed; top: 0; left: 0; right: 0; height: 75px;
            background: var(--header-bg); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 1000; backdrop-filter: blur(20px);
        }

        .brand { font-weight: 900; font-size: 1.3rem; color: var(--text-main); text-decoration: none; letter-spacing: -0.5px; }
        .brand span { color: #00ffa3; }

        .theme-toggle {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-main); width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px var(--shadow);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- MAPA --- */
        #map-master { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- BUSCADOR --- */
        .search-container {
            position: absolute; top: 95px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 480px; z-index: 1000;
        }

        .glass-input {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px 20px; display: flex; align-items: center;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .glass-input i { color: var(--text-muted); font-size: 1.1rem; }
        .glass-input input { 
            background: transparent; border: none; color: var(--text-main); 
            width: 100%; outline: none; font-size: 1rem; font-weight: 500;
            margin-left: 12px;
        }

        #results-list {
            margin-top: 8px; background: var(--surface); border-radius: 16px;
            border: 1px solid var(--border); max-height: 0; overflow: hidden;
            box-shadow: 0 20px 40px var(--shadow); transition: 0.4s;
        }

        #results-list.show { max-height: 320px; padding: 8px; overflow-y: auto; }

        .local-card { 
            padding: 14px; border-radius: 12px; margin-bottom: 4px; 
            cursor: pointer; border-left: 3px solid transparent;
        }
        .local-card:hover { background: var(--bg); border-left-color: #00ffa3; }
        .local-card h4 { font-size: 1rem; margin-bottom: 2px; }
        .local-card p { font-size: 0.8rem; color: var(--text-muted); }

        /* --- GPS BUTTON --- */
        .fab-container { position: absolute; bottom: 35px; right: 25px; z-index: 1000; }
        .btn-elite {
            width: 60px; height: 60px; background: var(--surface);
            border-radius: 50%; border: 1px solid var(--border); color: var(--text-main);
            font-size: 1.4rem; cursor: pointer;
            box-shadow: 0 8px 24px var(--shadow);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-elite:active { transform: scale(0.9); }
        .btn-elite i { color: #3b82f6; } /* Azul GPS clásico */

        /* --- POPUPS PROFESIONALES --- */
        .maplibregl-popup-content {
            background: var(--surface) !important; color: var(--text-main) !important;
            border-radius: 16px !important; padding: 15px !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 15px 35px var(--shadow) !important;
        }
        .maplibregl-popup-close-button { color: var(--text-muted); padding: 5px; }

        .btn-gps-go {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #1e293b; color: #fff !important;
            text-align: center; padding: 12px; border-radius: 10px;
            text-decoration: none; font-weight: 700; margin-top: 12px;
            font-size: 0.8rem; transition: 0.2s;
        }
        body.light-mode .btn-gps-go { background: #000; }
        .btn-gps-go:hover { opacity: 0.9; }

        /* Marker Custom Pin */
        .marker-pin {
            width: 32px; height: 32px;
            background: var(--marker-color);
            border: 4px solid white; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body class="dark-mode">

    <header class="elite-header">
        <a href="index.html" class="brand">CENTRAL <span>SANTUA</span></a>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
    </header>

    <div id="map-master"></div>

    <div class="search-container">
        <div class="glass-input">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="engine-search" placeholder="¿A dónde vamos?" autocomplete="off">
        </div>
        <div id="results-list"></div>
    </div>

    <div class="fab-container">
        <button id="gps-btn" class="btn-elite" onclick="getMyLocation()">
            <i class="fa-solid fa-location-arrow"></i>
        </button>
    </div>

    <script>
        let map, locales = [], isDark = true;

        const STYLES = {
            dark: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            light: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json'
        };

        function bootMap() {
            map = new maplibregl.Map({
                container: 'map-master',
                style: STYLES.dark,
                center: [-58.3816, -34.6037],
                zoom: 12,
                antialias: true
            });

            map.on('load', () => {
                map.resize();
                loadCloudData();
            });
        }

        function toggleTheme() {
            isDark = !isDark;
            const icon = document.getElementById('theme-icon');
            
            if (isDark) {
                document.body.classList.remove('light-mode');
                icon.className = 'fas fa-moon';
                map.setStyle(STYLES.dark);
            } else {
                document.body.classList.add('light-mode');
                icon.className = 'fas fa-sun';
                map.setStyle(STYLES.light);
            }
        }

        async function loadCloudData() {
            // Estos datos vendrán de tu DB Render luego
            locales = [
                { id: 1, n: "Taller San Justo", d: "Av. Juan Manuel de Rosas 3000", lat: -34.685, lng: -58.551 },
                { id: 2, n: "Moto Partes Avellaneda", d: "Av. Mitre 1500", lat: -34.661, lng: -58.366 },
                { id: 3, n: "Service Oficial Quilmes", d: "Calle 14 nro 450", lat: -34.721, lng: -58.256 }
            ];
            locales.forEach(loc => addEliteMarker(loc));
        }

        function addEliteMarker(loc) {
            const el = document.createElement('div');
            el.className = 'marker-pin';
            
            new maplibregl.Marker({element: el})
                .setLngLat([loc.lng, loc.lat])
                .setPopup(new maplibregl.Popup({ offset: 35 }).setHTML(`
                    <div style="min-width:180px">
                        <h3 style="margin-bottom:4px; font-weight:700">${loc.n}</h3>
                        <p style="font-size:0.8rem; color:var(--text-muted)">${loc.d}</p>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank" class="btn-gps-go">
                            <i class="fa-solid fa-paper-plane"></i> INDICACIONES
                        </a>
                    </div>
                `))
                .addTo(map);
        }

        function getMyLocation() {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const { longitude, latitude } = pos.coords;
                    map.flyTo({ center: [longitude, latitude], zoom: 15, speed: 1.2 });
                    
                    const el = document.createElement('div');
                    el.innerHTML = '<div style="width:18px; height:18px; background:#3b82f6; border:3px solid white; border-radius:50%; box-shadow:0 0 10px rgba(0,0,0,0.3)"></div>';
                    
                    new maplibregl.Marker({element: el})
                        .setLngLat([longitude, latitude])
                        .addTo(map);
                },
                err => alert("Activa el GPS para localizarte."),
                { enableHighAccuracy: true }
            );
        }

        // Buscador Inteligente
        const input = document.getElementById('engine-search');
        const list = document.getElementById('results-list');

        input.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if(val.length < 2) { list.classList.remove('show'); return; }

            const filtered = locales.filter(l => l.n.toLowerCase().includes(val));
            list.innerHTML = filtered.map(l => `
                <div class="local-card" onclick="flyToLoc(${l.lat}, ${l.lng}, '${l.n}')">
                    <h4>${l.n}</h4>
                    <p>${l.d}</p>
                </div>
            `).join('');
            filtered.length > 0 ? list.classList.add('show') : list.classList.remove('show');
        });

        function flyToLoc(lat, lng, name) {
            map.flyTo({ center: [lng, lat], zoom: 16 });
            input.value = name;
            list.classList.remove('show');
        }

        window.onload = bootMap;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red de Distribución | Central Santua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.4);
            --bg-dark: #020617;
            --surface: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --header-h: 70px;
        }

        /* --- Reset y Estilos Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- Layout Maestro --- */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* --- Header Premium --- */
        .main-header {
            height: var(--header-h);
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid var(--border);
            z-index: 5000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-logo { 
            width: 35px; height: 35px; background: var(--accent); 
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 800; font-size: 1.2rem;
        }
        .brand-name { font-weight: 800; font-size: 1.3rem; color: var(--accent); letter-spacing: -0.5px; }

        .nav-links { display: flex; gap: 20px; }
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--accent); }

        /* --- Contenedor de Mapa y UI --- */
        .map-viewport {
            position: relative;
            flex: 1;
            width: 100%;
        }

        #map-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: #0b0e14;
        }

        /* --- Interfaz Flotante (Search) --- */
        .floating-search-wrap {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 480px;
            z-index: 2000;
        }

        .search-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-card:focus-within { border-color: var(--accent); transform: translateX(-50%) translateY(-2px); width: 92%; }

        .search-card i { color: var(--accent); font-size: 1.1rem; margin-right: 15px; }
        .search-card input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            font-weight: 400;
        }

        /* --- Lista de Resultados Sugeridos --- */
        .suggestions-panel {
            margin-top: 10px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .suggestions-panel.active { max-height: 350px; overflow-y: auto; padding: 10px; }

        .suggest-item {
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 5px;
            animation: fadeIn 0.3s forwards;
        }

        .suggest-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
        .suggest-icon { width: 40px; height: 40px; background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .suggest-info h4 { font-size: 0.9rem; margin-bottom: 2px; }
        .suggest-info p { font-size: 0.75rem; color: var(--text-dim); }

        /* --- Botones de Control --- */
        .map-actions {
            position: absolute;
            right: 20px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
        }

        .fab-btn {
            width: 56px; height: 56px;
            background: var(--accent);
            border: none; border-radius: 18px;
            color: #000; font-size: 1.4rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px var(--accent-glow);
            transition: 0.3s;
        }

        .fab-btn:active { transform: scale(0.9); }
        .fab-btn.secondary { background: #1e293b; color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

        /* --- Custom Popups Leaflet --- */
        .leaflet-popup-content-wrapper { background: #0f172a; color: white; border-radius: 18px; border: 1px solid var(--border); padding: 0; overflow: hidden; }
        .leaflet-popup-tip { background: #0f172a; }
        
        .venue-popup { width: 220px; }
        .venue-img { width: 100%; height: 100px; background: #1e293b; object-fit: cover; }
        .venue-content { padding: 15px; }
        .venue-content h3 { font-size: 1rem; color: var(--accent); margin-bottom: 5px; }
        .venue-content p { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; }
        
        .route-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--accent); color: #000;
            padding: 10px; border-radius: 10px;
            text-decoration: none; font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; transition: 0.3s;
        }

        /* --- Media Queries (Mobile Fixes) --- */
        @media (max-width: 600px) {
            .brand-name { display: none; }
            .floating-search-wrap { top: 15px; }
            .suggestions-panel.active { max-height: 45vh; }
            .nav-links { gap: 10px; }
            .fab-btn { width: 50px; height: 50px; border-radius: 14px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="main-header">
        <a href="index.html" class="brand">
            <div class="brand-logo">S</div>
            <span class="brand-name">CENTRAL SANTUA</span>
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Inicio</a>
            <a href="#" class="nav-item active">Puntos</a>
            <a href="perfil.html" class="nav-item">Perfil</a>
        </nav>
    </header>

    <main class="map-viewport">
        <div class="floating-search-wrap">
            <div class="search-card">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="main-search" placeholder="Buscar barrio, ciudad o local..." autocomplete="off">
            </div>
            <div id="suggestions" class="suggestions-panel">
                </div>
        </div>

        <div id="map-canvas"></div>

        <div class="map-actions">
            <button class="fab-btn secondary" onclick="changeMapStyle()" title="Cambiar Estilo"><i class="fa-solid fa-layer-group"></i></button>
            <button class="fab-btn" onclick="geolocalizar()" title="Mi Ubicación"><i class="fa-solid fa-location-arrow"></i></button>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    /** * CENTRAL SANTUA - MAP ENGINE V3.0
     * Lógica profesional de geolocalización y renderizado
     */

    const CONFIG = {
        center: [-34.6037, -58.3816],
        zoom: 12,
        styles: [
            'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
        ]
    };

    let map, markers = [], currentStyle = 0, userPos = null;
    let localesData = [];

    // Inicialización del Motor
    function initApp() {
        map = L.map('map-canvas', { 
            zoomControl: false,
            attributionControl: false 
        }).setView(CONFIG.center, CONFIG.zoom);

        L.tileLayer(CONFIG.styles[currentStyle]).addTo(map);

        // Simular Carga de Datos (Aquí conectarás tu fetch real)
        fetchLocales();
    }

    async function fetchLocales() {
        // Simulación de delay de red para efectos pro
        setTimeout(() => {
            localesData = [
                { id: 1, name: "Repuestos 'El Titán'", barrio: "Lanús Este", dir: "H. Yrigoyen 4200", lat: -34.704, lng: -58.391 },
                { id: 2, name: "Motosur Quilmes", barrio: "Quilmes Centro", dir: "Rivadavia 320", lat: -34.722, lng: -58.257 },
                { id: 3, name: "Taller Santua Oficial", barrio: "Avellaneda", dir: "Av. Mitre 900", lat: -34.661, lng: -58.366 },
                { id: 4, name: "Accesorios Speed", barrio: "Lomas de Zamora", dir: "Laprida 150", lat: -34.759, lng: -58.402 }
            ];
            renderMarkers();
        }, 800);
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        
        localesData.forEach(loc => {
            const m = L.marker([loc.lat, loc.lng]).addTo(map);
            const routeUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`;
            
            m.bindPopup(`
                <div class="venue-popup">
                    <div class="venue-content">
                        <h3>${loc.name}</h3>
                        <p><i class="fa-solid fa-location-dot"></i> ${loc.dir}, ${loc.barrio}</p>
                        <a href="${routeUrl}" target="_blank" class="route-btn">
                            <i class="fa-solid fa-diamond-turn-right"></i> Cómo llegar
                        </a>
                    </div>
                </div>
            `);
            markers.push(m);
        });
    }

    // Sistema de Búsqueda Reactiva
    const searchInput = document.getElementById('main-search');
    const suggestPanel = document.getElementById('suggestions');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length < 2) {
            suggestPanel.classList.remove('active');
            return;
        }

        const filtered = localesData.filter(l => 
            l.name.toLowerCase().includes(query) || 
            l.barrio.toLowerCase().includes(query)
        );

        if (filtered.length > 0) {
            suggestPanel.innerHTML = filtered.map(l => `
                <div class="suggest-item" onclick="focusLocal(${l.lat}, ${l.lng}, '${l.name}')">
                    <div class="suggest-icon"><i class="fa-solid fa-shop"></i></div>
                    <div class="suggest-info">
                        <h4>${l.name}</h4>
                        <p>${l.barrio} - ${l.dir}</p>
                    </div>
                </div>
            `).join('');
            suggestPanel.classList.add('active');
        } else {
            suggestPanel.classList.remove('active');
        }
    });

    function focusLocal(lat, lng, name) {
        map.flyTo([lat, lng], 16, { duration: 1.5 });
        searchInput.value = name;
        suggestPanel.classList.remove('active');
    }

    // Geolocalización Avanzada
    function geolocalizar() {
        map.locate({ setView: true, maxZoom: 15 });
    }

    map.on('locationfound', (e) => {
        if (userPos) map.removeLayer(userPos);
        userPos = L.circleMarker(e.latlng, {
            radius: 10, weight: 3, color: '#fff', fillColor: '#007bff', fillOpacity: 0.8
        }).addTo(map);
        userPos.bindPopup("Estás aquí").openPopup();
    });

    function changeMapStyle() {
        currentStyle = (currentStyle + 1) % CONFIG.styles.length;
        L.tileLayer(CONFIG.styles[currentStyle]).addTo(map);
    }

    // Iniciar
    initApp();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontrá tu Punto de Venta | Central Santua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --accent: #00ff88;
            --bg: #0a0c10;
            --panel: #161b22;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header {
            padding: 15px 25px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        .logo { font-weight: 900; color: var(--accent); text-decoration: none; font-size: 1.4rem; letter-spacing: 1px; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR DE BUSQUEDA --- */
        .sidebar {
            width: 350px;
            background: var(--panel);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .search-box {
            padding: 20px;
            background: #000;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--accent);
        }

        #buscador {
            width: 100%;
            background: #1f242c;
            border: 1px solid #30363d;
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        #buscador:focus { border-color: var(--accent); }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .local-item {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #0d1117;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .local-item:hover { border-color: var(--accent); background: #1c2128; }

        .local-item h4 { color: var(--accent); margin-bottom: 5px; font-size: 0.95rem; }
        .local-item p { font-size: 0.8rem; color: #8b949e; }

        /* --- MAPA --- */
        #map { flex: 1; position: relative; }

        /* Botón GPS */
        .btn-gps {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: black;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            z-index: 1000;
            transition: 0.3s;
        }
        .btn-gps:hover { transform: scale(1.1); }

        /* Popups personalizados */
        .leaflet-popup-content-wrapper { background: #0d1117; color: white; border-radius: 10px; border: 1px solid var(--accent); }
        .btn-wa-popup {
            background: #25d366;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { width: 100%; height: 35%; }
            #map { height: 65%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">CENTRAL SANTUA</a>
        <div style="display:flex; gap:10px;">
            <a href="index.html" style="color:white; text-decoration:none; font-size: 0.8rem;">INICIO</a>
            <a href="perfil.html" style="color:white; text-decoration:none; font-size: 0.8rem; margin-left:15px;">MI PERFIL</a>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="search-box">
                <h3 style="margin-bottom:15px; font-size: 1rem;">Puntos de Venta</h3>
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="buscador" placeholder="Buscar por barrio o zona...">
                </div>
            </div>
            <div class="results-list" id="lista-locales">
                </div>
        </div>

        <div id="map">
            <button class="btn-gps" onclick="miUbicacion()" title="Mi ubicación">
                <i class="fas fa-crosshairs"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let localesData = []; // Para guardar lo que viene del server
        const map = L.map('map', { zoomControl: false }).setView([-34.6037, -58.3816], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Capa de mapa: Usamos una versión "Voyager Labels Under" que es oscura pero con más azul y vida
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker;

        // GPS: Detectar mi zona
        function miUbicacion() {
            map.locate({setView: true, maxZoom: 15});
        }

        map.on('locationfound', function(e) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(e.latlng, {
                radius: 8,
                fillColor: "#007bff",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup("Estás aquí").openPopup();
        });

        // Cargar locales
        async function cargarLocales() {
            try {
                // Simulación de datos (acá iría tu fetch('/api/puntos-venta'))
                localesData = [
                    { nombre: "Repuestos Avellaneda", zona: "Avellaneda", direccion: "Av. Mitre 1200", lat: -34.662, lng: -58.365, wa: "110000000" },
                    { nombre: "Moto Shop Quilmes", zona: "Quilmes", direccion: "Rivadavia 400", lat: -34.721, lng: -58.256, wa: "110000001" }
                ];

                renderizarLocales(localesData);
            } catch (e) { console.error(e); }
        }

        function renderizarLocales(lista) {
            const container = document.getElementById('lista-locales');
            container.innerHTML = '';

            lista.forEach(local => {
                // Marker en mapa
                const m = L.marker([local.lat, local.lng]).addTo(map);
                m.bindPopup(`
                    <div style="color:white">
                        <b>${local.nombre}</b><br>${local.direccion}<br>
                        <a href="https://wa.me/${local.wa}" class="btn-wa-popup">WhatsApp</a>
                    </div>
                `);

                // Item en lista lateral
                const item = document.createElement('div');
                item.className = 'local-item';
                item.innerHTML = `
                    <h4>${local.nombre}</h4>
                    <p><i class="fas fa-map-marker-alt"></i> ${local.zona} - ${local.direccion}</p>
                `;
                item.onclick = () => {
                    map.flyTo([local.lat, local.lng], 16);
                    m.openPopup();
                };
                container.appendChild(item);
            });
        }

        // Buscador por zonas
        document.getElementById('buscador').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = localesData.filter(l => 
                l.zona.toLowerCase().includes(term) || 
                l.nombre.toLowerCase().includes(term)
            );
            renderizarLocales(filtrados);
        });

        cargarLocales();
    </script>
</body>
</html>

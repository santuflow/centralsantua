<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puntos de Venta | Central Santua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --accent: #00ff88;
            --dark: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Forzar altura total para que el mapa NO desaparezca */
        html, body { height: 100%; width: 100%; background: #000; overflow: hidden; }

        /* --- HEADER ESTILO NEÓN --- */
        header {
            height: 65px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
            z-index: 2000;
            position: relative;
        }
        .logo { font-weight: 800; color: var(--accent); text-decoration: none; font-size: 1.2rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 600; margin-left: 15px; }

        /* --- CONTENEDOR DEL MAPA --- */
        #map-container {
            position: absolute;
            top: 65px;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            background: #111; /* Color de fondo mientras carga el mapa */
        }

        #map { width: 100%; height: 100%; }

        /* --- BUSCADOR FLOTANTE (ESTILO SMARTPHONE) --- */
        .search-overlay {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            z-index: 1001;
        }

        .search-bar {
            background: var(--panel);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .search-bar i { color: var(--accent); margin-right: 15px; }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }

        /* --- LISTA DE RESULTADOS DINÁMICA --- */
        #results-box {
            margin-top: 8px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            border-radius: 14px;
            border: 1px solid var(--border);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .result-item:hover { background: rgba(0, 255, 136, 0.05); }
        .result-item h4 { color: var(--accent); font-size: 0.95rem; }
        .result-item p { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }

        /* --- BOTONES DE ACCIÓN (ESQUINA INFERIOR) --- */
        .map-tools {
            position: absolute;
            right: 20px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1001;
        }

        .btn-tool {
            width: 55px; height: 55px;
            background: var(--accent);
            border-radius: 16px;
            border: none;
            color: #000;
            font-size: 1.4rem;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- POPUPS ESTILO PREMIUM --- */
        .leaflet-popup-content-wrapper {
            background: #0f172a !important;
            color: white !important;
            border-radius: 15px !important;
            padding: 5px;
            border: 1px solid var(--accent);
        }
        .leaflet-popup-tip { background: var(--accent) !important; }

        .popup-info h3 { color: var(--accent); margin-bottom: 5px; font-size: 1rem; }
        .popup-info p { font-size: 0.8rem; margin-bottom: 12px; color: #cbd5e1; }
        
        .btn-route {
            display: block;
            background: var(--accent);
            color: #000;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Corrección para que el mapa ocupe todo en móviles */
        @media (max-width: 600px) {
            header { height: 60px; }
            #map-container { top: 60px; }
            .search-overlay { top: 75px; }
            .btn-tool { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">CENTRAL SANTUA</a>
        <nav>
            <a href="index.html" class="nav-link">INICIO</a>
            <a href="perfil.html" class="nav-link">PERFIL</a>
        </nav>
    </header>

    <div id="map-container">
        <div id="map"></div>

        <div class="search-overlay">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="input-search" placeholder="Buscar por ciudad, barrio o local..." autocomplete="off">
            </div>
            <div id="results-box">
                </div>
        </div>

        <div class="map-tools">
            <button class="btn-tool" onclick="centrarEnMi()" title="Mi Ubicación">
                <i class="fas fa-location-arrow"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        /**
         * MOTOR DE MAPAS CENTRAL SANTUA V4.0
         * Optimizado para renderizado inmediato
         */
        
        let map, locales = [], markers = [], userMarker;

        function initMap() {
            // 1. Inicializar el mapa (se centra en Buenos Aires por defecto)
            map = L.map('map', { 
                zoomControl: false,
                attributionControl: false 
            }).setView([-34.6037, -58.3816], 12);

            // 2. Capa de mapa: Estilo Voyager (Claro, nítido y pro)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            // 3. Forzar el redimensionamiento (Esto arregla el bug de que no aparece)
            setTimeout(() => { map.invalidateSize(); }, 500);

            cargarDatos();
        }

        async function cargarDatos() {
            // AQUÍ IRÍA TU FETCH('/api/puntos-venta')
            // Ejemplo de datos para probar:
            locales = [
                { id: 1, nombre: "Repuestos 'La Tuerca'", zona: "Avellaneda", dir: "Av. Mitre 800", lat: -34.6621, lng: -58.3655 },
                { id: 2, nombre: "Moto Service Premium", zona: "Quilmes", dir: "Rivadavia 150", lat: -34.7214, lng: -58.2566 },
                { id: 3, nombre: "Accesorios Lanús", zona: "Lanús", dir: "25 de Mayo 120", lat: -34.7042, lng: -58.3912 }
            ];

            renderMarkers(locales);
        }

        function renderMarkers(data) {
            // Limpiar markers anteriores
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            data.forEach(l => {
                const marker = L.marker([l.lat, l.lng]).addTo(map);
                const googleUrl = `https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}`;
                
                marker.bindPopup(`
                    <div class="popup-info">
                        <h3>${l.nombre}</h3>
                        <p><i class="fas fa-map-marker-alt"></i> ${l.zona} - ${l.dir}</p>
                        <a href="${googleUrl}" target="_blank" class="btn-route">
                            <i class="fas fa-directions"></i> CÓMO LLEGAR
                        </a>
                    </div>
                `);
                markers.push(marker);
            });
        }

        // --- SISTEMA DE BÚSQUEDA ---
        const input = document.getElementById('input-search');
        const box = document.getElementById('results-box');

        input.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 2) { box.style.display = 'none'; return; }

            const filtered = locales.filter(l => 
                l.nombre.toLowerCase().includes(val) || 
                l.zona.toLowerCase().includes(val)
            );

            if (filtered.length > 0) {
                box.style.display = 'block';
                box.innerHTML = filtered.map(l => `
                    <div class="result-item" onclick="focusLocal(${l.lat}, ${l.lng}, '${l.nombre}')">
                        <h4>${l.nombre}</h4>
                        <p>${l.zona} - ${l.dir}</p>
                    </div>
                `).join('');
            } else {
                box.style.display = 'none';
            }
        });

        function focusLocal(lat, lng, nombre) {
            map.flyTo([lat, lng], 16, { duration: 1.5 });
            input.value = nombre;
            box.style.display = 'none';
        }

        // --- GPS ---
        function centrarEnMi() {
            map.locate({ setView: true, maxZoom: 15 });
        }

        map.on('locationfound', (e) => {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(e.latlng, {
                radius: 10, color: '#fff', fillColor: '#0066ff', fillOpacity: 0.9, weight: 3
            }).addTo(map).bindPopup("Estás aquí").openPopup();
        });

        // Ejecutar al cargar la ventana
        window.onload = initMap;
    </script>
</body>
</html>
